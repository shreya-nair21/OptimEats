<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Old Age / Orphanage portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='main.css') }}" rel="stylesheet">
  <style>
    body {
      padding-top: 100px;
    }

    .form-container {
      width: 100%;
      max-width: 500px;
      margin: 0 auto;
    }
  </style>
</head>

<body>
  <nav class="navbar navbar-expand-lg navbar-custom fixed-top">
    <div class="container">
      <a class="navbar-brand" href="/">OptimEats</a>
      <!-- Navigation Links Commented Out -->
    </div>
  </nav>

  <div class="form-container custom-card p-4 mt-5">
    <h3 class="text-center mb-4 text-dark">Old Age Home / Orphanage Registration</h3>
    <form id="businessForm">

      <div class="mb-3">
        <label class="form-label"> Type: </label><br>
        <input type="radio" name="type" value="old_age_home"> Old Age Home</input><br>
        <input type="radio" name="type" value="orphanage"> Orphanage</input><br>
      </div>
      <div class="mb-3">
        <label class="form-label">Name</label>
        <input type="text" class="form-control" id="businessName" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Contact Info</label>
        <input type="text" class="form-control" id="contact" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" id="email" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Number of people </label>
        <input type="number" class="form-control" id="people" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Address</label>
        <textarea class="form-control" id="address" rows="2" required></textarea>
      </div>
      <button type="submit" class="btn btn-primary-custom w-100 py-2">Register</button>
      <a href="/" class="btn btn-outline-custom w-100 py-2 mt-3">Back To Home</a>
    </form>
  </div>

  <script src="{{ url_for('static', filename='main.js') }}"></script>
</body>

</html>
