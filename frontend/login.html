<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - OptimEats</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='main.css') }}" rel="stylesheet">
    <style>
        body,
        html {
            height: 100%;
            overflow: hidden;
        }

        .split-layout {
            display: flex;
            height: 100vh;
            width: 100%;
        }

        .side-image {
            flex: 1;
            background: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.3)), url('https://images.unsplash.com/photo-1593113598332-cd288d649433?auto=format&fit=crop&q=80&w=1740');
            /* Professional community/food image */
            background-size: cover;
            background-position: center;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 60px;
            color: white;
        }

        .side-form {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px;
            background: white;
            max-width: 600px;
        }

        .login-wrapper {
            width: 100%;
            max-width: 400px;
        }

        .brand-logo {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0;
            color: white;
            text-decoration: none;
        }

        .quote-box {
            border-left: 4px solid var(--primary);
            padding-left: 20px;
        }

        .quote-text {
            font-size: 1.5rem;
            font-weight: 600;
            line-height: 1.4;
        }

        /* Mobile Responsive */
        @media (max-width: 900px) {
            .side-image {
                display: none;
            }

            .side-form {
                max-width: 100%;
                padding: 20px;
            }
        }
    </style>
</head>

<body>

    <div class="split-layout">
        <!-- Left Side: Brand & visual -->
        <div class="side-image">
            <a href="/" class="brand-logo">OptimEats</a>
            <div class="quote-box">
                <p class="quote-text">"The best way to find yourself is to lose yourself in the service of others."</p>
                <p class="mb-0 opacity-75">— Mahatma Gandhi</p>
            </div>
        </div>

        <!-- Right Side: Clean Form -->
        <div class="side-form">
            <div class="login-wrapper">
                <div class="mb-5">
                    <h2 class="fw-bold text-dark mb-1">Welcome back</h2>
                    <p class="text-muted">Please enter your details to sign in.</p>
                </div>

                <form id="loginForm">
                    <div class="mb-4">
                        <label for="email" class="form-label small fw-bold text-uppercase text-muted"
                            style="font-size: 0.75rem; letter-spacing: 1px;">Email Address</label>
                        <input type="email" class="form-control bg-light border-0 py-3" id="email" required
                            placeholder="name@company.com">
                    </div>

                    <div class="mb-4">
                        <div class="d-flex justify-content-between align-items-center mb-1">
                            <label for="password" class="form-label small fw-bold text-uppercase text-muted"
                                style="font-size: 0.75rem; letter-spacing: 1px;">Password</label>
                            <a href="#" class="small text-decoration-none text-muted">Forgot password?</a>
                        </div>
                        <input type="password" class="form-control bg-light border-0 py-3" id="password" required
                            placeholder="••••••••">
                    </div>

                    <div class="mb-4">
                        <label class="form-label small fw-bold text-uppercase text-muted d-block mb-2"
                            style="font-size: 0.75rem; letter-spacing: 1px;">Account Type</label>
                        <div class="row g-2">
                            <div class="col-6">
                                <label
                                    class="btn btn-outline-light text-dark border w-100 py-2 d-flex align-items-center justify-content-center gap-2">
                                    <input type="radio" name="login_type" value="user" checked
                                        class="form-check-input mt-0">
                                    <span>Donor</span>
                                </label>
                            </div>
                            <div class="col-6">
                                <label
                                    class="btn btn-outline-light text-dark border w-100 py-2 d-flex align-items-center justify-content-center gap-2">
                                    <input type="radio" name="login_type" value="business"
                                        class="form-check-input mt-0">
                                    <span>Organization</span>
                                </label>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-dark w-100 py-3 fw-bold rounded-3">Sign in</button>
                </form>

                <div class="text-center mt-4">
                    <p class="text-muted small">Don't have an account? <a href="signup.html"
                            class="text-dark fw-bold text-decoration-none">Create free account</a></p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = e.target.querySelector('button');
            const originalText = btn.innerText;

            btn.innerText = 'Signing in...';
            btn.disabled = true;

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const result = await response.json();

                if (response.ok) {
                    if (result.type === 'business') {
                        window.location.href = `/org-dashboard?id=${result.id}`;
                    } else {
                        window.location.href = '/donor_dashboard.html';
                    }
                } else {
                    alert(result.error);
                    btn.innerText = originalText;
                    btn.disabled = false;
                }
            } catch (error) {
                console.error('Error logging in:', error);
                alert('Login failed. Please check your connection.');
                btn.innerText = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
