<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transparency Report</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #fff7f7;
      padding-top: 70px;
    }

    .stat-card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      margin-bottom: 20px;
    }

    .stat-number {
      font-size: 2.5rem;
      font-weight: bold;
      color: #2ecc71;
    }

    .highlight-table {
      background: white;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      overflow: hidden;
    }
  </style>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
    <div class="container-fluid">
      <a class="navbar-brand" href="/">OptimEats</a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="business.html">Business Portal</a></li>
          <li class="nav-item"><a class="nav-link" href="donations.html">User Portal</a></li>
          <li class="nav-item"><a class="nav-link" href="in_need.html">In-Need Meals</a></li>
        </ul>
      </div>
    </div>
  </nav>
</head>

<body>
  <div class="container mt-5">
    <h1 class="text-center mb-5">Transparency & Impact Report</h1>

    <!-- Stats Row -->
    <div class="row mb-5" id="stats-container">
      <div class="col-md-4">
        <div class="stat-card">
          <h3 class="stat-number" id="total-funds">₹0</h3>
          <p>Total Funds Raised</p>
        </div>
      </div>
      <div class="col-md-4">
        <div class="stat-card">
          <h3 class="stat-number" id="meals-provided">0</h3>
          <p>Meals Provided</p>
        </div>
      </div>
      <div class="col-md-4">
        <div class="stat-card">
          <h3 class="stat-number" id="active-business">0</h3>
          <p>Participating Businesses</p>
        </div>
      </div>
    </div>

    <!-- Top Donors -->
    <div class="row justify-content-center">
      <div class="col-md-8">
        <h3 class="text-center mb-4">Top Donors</h3>
        <div class="highlight-table">
          <table class="table table-striped mb-0">
            <thead class="table-dark">
              <tr>
                <th>Rank</th>
                <th>Donor Name</th>
                <th class="text-end">Amount Donated</th>
              </tr>
            </thead>
            <tbody id="top-donors-list">
              <!-- JS Populates this -->
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='main.js') }}"></script>
  <script>
    document.addEventListener('DOMContentLoaded', loadTransparencyReport);
  </script>
</body>

</html>
