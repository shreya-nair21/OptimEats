<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - OptimEats</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='main.css') }}" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('https://images.unsplash.com/photo-1593113598332-cd288d649433?auto=format&fit=crop&q=80&w=1740');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-custom {
            background: white;
            border-radius: 15px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .btn-custom {
            background: #FF4B2B;
            border: none;
            color: white;
            padding: 12px;
            border-radius: 20px;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
            width: 100%;
            margin-top: 15px;
        }

        .btn-custom:hover {
            background: #FF416C;
            color: white;
        }
    </style>
</head>

<body>
    <div class="card-custom">
        <h2 class="mb-3" style="font-weight: bold; color: #333;">Reset Password</h2>
        <p class="text-muted mb-4">Enter your new password below.</p>

        <form id="resetPasswordForm">
            <!-- Hidden field to hold the token from the URL -->
            <input type="hidden" id="token" />

            <div class="mb-3 text-start">
                <input type="password" class="form-control form-control-lg bg-light" id="newPassword"
                    placeholder="New Password" required minlength="6">
            </div>
            <div class="mb-3 text-start">
                <input type="password" class="form-control form-control-lg bg-light" id="confirmPassword"
                    placeholder="Confirm Password" required minlength="6">
            </div>
            <button type="submit" class="btn btn-custom" id="submitBtn">Update Password</button>
        </form>

        <div id="messageArea" class="mt-4"></div>
        <div id="loginLinkArea" class="mt-3" style="display: none;">
            <a href="/login.html" class="btn btn-outline-dark w-100 rounded-pill">Proceed to Login</a>
        </div>
    </div>

    <script>
        // Extract token from URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            document.getElementById('messageArea').innerHTML = '<div class="alert alert-danger">Invalid or missing reset token!</div>';
            document.getElementById('submitBtn').disabled = true;
        } else {
            document.getElementById('token').value = token;
        }

        document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const msgArea = document.getElementById('messageArea');
            const pwd1 = document.getElementById('newPassword').value;
            const pwd2 = document.getElementById('confirmPassword').value;
            const tokenValue = document.getElementById('token').value;

            if (pwd1 !== pwd2) {
                msgArea.innerHTML = '<div class="alert alert-warning">Passwords do not match!</div>';
                return;
            }

            btn.disabled = true;
            btn.innerText = 'Updating...';
            msgArea.innerHTML = '';

            try {
                const response = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: tokenValue, password: pwd1 })
                });

                const result = await response.json();

                if (response.ok) {
                    msgArea.innerHTML = `<div class="alert alert-success">${result.message}</div>`;
                    document.getElementById('resetPasswordForm').style.display = 'none';
                    document.getElementById('loginLinkArea').style.display = 'block';
                } else {
                    msgArea.innerHTML = `<div class="alert alert-danger">${result.error || 'Something went wrong.'}</div>`;
                    btn.disabled = false;
                    btn.innerText = 'Update Password';
                }
            } catch (error) {
                msgArea.innerHTML = `<div class="alert alert-danger">Network error. Please try again.</div>`;
                btn.disabled = false;
                btn.innerText = 'Update Password';
            }
        });
    </script>
</body>

</html>
