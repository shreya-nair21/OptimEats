<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - OptimEats</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='main.css') }}" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('https://images.unsplash.com/photo-1593113598332-cd288d649433?auto=format&fit=crop&q=80&w=1740');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-custom {
            background: white;
            border-radius: 15px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .btn-custom {
            background: #FF4B2B;
            border: none;
            color: white;
            padding: 12px;
            border-radius: 20px;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
            width: 100%;
            margin-top: 15px;
        }

        .btn-custom:hover {
            background: #FF416C;
            color: white;
        }
    </style>
</head>

<body>
    <div class="card-custom">
        <h2 class="mb-3" style="font-weight: bold; color: #333;">Identify Account</h2>
        <p class="text-muted mb-4">Enter your email address and we will send you a link to reset your password.</p>

        <form id="forgotPasswordForm">
            <div class="mb-3">
                <input type="email" class="form-control form-control-lg bg-light" id="email" placeholder="Email Address"
                    required>
            </div>
            <button type="submit" class="btn btn-custom" id="submitBtn">Send Reset Link</button>
        </form>

        <div class="mt-4">
            <a href="/login.html" class="text-decoration-none text-muted" style="font-size: 14px;"><i
                    class="fas fa-arrow-left"></i> Back to Login</a>
        </div>

        <div id="messageArea" class="mt-3"></div>
    </div>

    <script>
        document.getElementById('forgotPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const msgArea = document.getElementById('messageArea');
            const email = document.getElementById('email').value;

            btn.disabled = true;
            btn.innerText = 'Sending...';
            msgArea.innerHTML = '';

            try {
                const response = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const result = await response.json();

                if (response.ok) {
                    msgArea.innerHTML = `<div class="alert alert-success">${result.message}</div>`;
                    document.getElementById('forgotPasswordForm').reset();
                } else {
                    msgArea.innerHTML = `<div class="alert alert-danger">${result.error || 'Something went wrong.'}</div>`;
                }
            } catch (error) {
                msgArea.innerHTML = `<div class="alert alert-danger">Network error. Please try again.</div>`;
            } finally {
                btn.disabled = false;
                btn.innerText = 'Send Reset Link';
            }
        });
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/js/all.min.js"></script>
</body>

</html>
