<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Donation & User Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f0f7ff;
      padding-top: 70px;
    }

    .container-custom {
      max-width: 900px;
      margin: 0 auto;
    }

    .form-card {
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
      margin-bottom: 25px;
    }

    h4 {
      color: #0d6efd;
      margin-bottom: 20px;
    }
  </style>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
    <div class="container-fluid">
      <a class="navbar-brand" href="/">OptimEats</a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="business.html">Business Portal</a></li>
          <li class="nav-item"><a class="nav-link" href="transparency.html">Transparency</a></li>
          <li class="nav-item"><a class="nav-link" href="in_need.html">In-Need Meals</a></li>
        </ul>
      </div>
    </div>
  </nav>
</head>

<body>
  <div class="container-custom mt-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2 class="text-secondary">User Portal</h2>
    </div>

    <div class="row">
      <!-- User Registration -->
      <div class="col-md-6">
        <div class="form-card border-top border-4 border-info">
          <h4>User Registration</h4>
          <form id="userRegForm">
            <div class="mb-3">
              <input type="text" class="form-control" id="userName" placeholder="Full Name" required>
            </div>
            <div class="mb-3">
              <input type="email" class="form-control" id="userEmail" placeholder="Email" required>
            </div>
            <div class="mb-3">
              <input type="password" class="form-control" id="userPassword" placeholder="Password" required>
            </div>
            <div class="mb-3 row">

              <div class="col">
                <input type="tel" class="form-control" id="userPhone" placeholder="Phone">
              </div>
            </div>
            <button type="submit" class="btn btn-info text-white w-100">Register User</button>
          </form>
        </div>
      </div>

      <!-- Donations -->
      <div class="col-md-6">
        <!-- Money Donation -->
        <div class="form-card border-top border-4 border-primary">
          <h4>Money Donation</h4>
          <form id="moneyDonationForm">
            <div class="mb-3">
              <input type="text" class="form-control" id="donorName" placeholder="Donor Name" required>
            </div>
            <div class="mb-3">
              <input type="number" class="form-control" id="amount" placeholder="Amount (₹)" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Donate Money</button>
          </form>
        </div>

        <!-- Food Donation -->
        <div class="form-card border-top border-4 border-success">
          <h4>Food Donation</h4>
          <form id="foodDonationForm">
            <div class="mb-3">
              <select class="form-select" id="foodType">
                <option value="1">Fresh Meal</option>
                <option value="2">Packaged Food</option>
              </select>
            </div>
            <div class="mb-3">
              <input type="number" class="form-control" id="quantity" placeholder="Quantity/Value" required>
            </div>
            <button type="submit" class="btn btn-success w-100">Donate Food</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='main.js') }}"></script>
</body>

</html>
