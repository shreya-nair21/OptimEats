<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Donation & User Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='main.css') }}" rel="stylesheet">
  <style>
    body {
      padding-top: 100px;
    }

    .container-custom {
      max-width: 900px;
      margin: 0 auto;
    }

    h4 {
      color: var(--primary);
      margin-bottom: 20px;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <nav class="navbar navbar-expand-lg navbar-custom fixed-top">
    <div class="container">
      <a class="navbar-brand" href="/">OptimEats</a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto align-items-center gap-3">
          <li class="nav-item"><a class="nav-link text-dark fw-bold" href="business.html">Business Portal</a></li>
          <li class="nav-item"><a class="nav-link text-dark fw-bold" href="transparency.html">Transparency</a></li>
          <li class="nav-item"><a class="nav-link text-dark fw-bold" href="in_need.html">In-Need Meals</a></li>
        </ul>
      </div>
    </div>
  </nav>
  <div class="container-custom mt-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2 class="text-secondary">User Portal</h2>
    </div>

    <div class="row">
      <!-- User Registration -->
      <div class="col-md-6">
        <div class="custom-card p-4 mb-4 border-top border-4" style="border-color: var(--primary) !important;">
          <h4>User Registration</h4>
          <form id="userRegForm">
            <div class="mb-3">
              <input type="text" class="form-control" id="userName" placeholder="Full Name" required>
            </div>
            <div class="mb-3">
              <input type="email" class="form-control" id="userEmail" placeholder="Email" required>
            </div>
            <div class="mb-3">
              <input type="password" class="form-control" id="userPassword" placeholder="Password" required>
            </div>
            <div class="mb-3 row">

              <div class="col">
                <input type="tel" class="form-control" id="userPhone" placeholder="Phone">
              </div>
            </div>
            <button type="submit" class="btn btn-primary-custom w-100">Register User</button>
          </form>
        </div>
      </div>

      <!-- Donations -->
      <div class="col-md-6">
        <!-- Money Donation -->
        <div class="custom-card p-4 mb-4 border-top border-4" style="border-color: var(--secondary) !important;">
          <h4>Money Donation</h4>
          <form id="moneyDonationForm">
            <div class="mb-3">
              <input type="text" class="form-control" id="donorName" placeholder="Donor Name" required>
            </div>
            <div class="mb-3">
              <input type="number" class="form-control" id="amount" placeholder="Amount (₹)" required>
            </div>
            <button type="submit" class="btn btn-primary-custom w-100">Donate Money</button>
          </form>
        </div>

        <!-- Food Donation -->
        <div class="custom-card p-4 mb-4 border-top border-4" style="border-color: #2ecc71 !important;">
          <h4>Food Donation</h4>
          <form id="foodDonationForm">
            <div class="mb-3">
              <select class="form-select" id="foodType">
                <option value="1">Fresh Meal</option>
                <option value="2">Packaged Food</option>
              </select>
            </div>
            <div class="mb-3">
              <input type="number" class="form-control" id="quantity" placeholder="Quantity/Value" required>
            </div>
            <button type="submit" class="btn btn-primary-custom w-100"
              style="background-color: #2ecc71; border-color: #2ecc71;">Donate Food</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='main.js') }}"></script>
</body>

</html>
