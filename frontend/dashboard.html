<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #fff7f7;
      padding-top: 70px;
    }
  </style>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
    <div class="container-fluid">
      <a class="navbar-brand" href="/">OptimEats</a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="business.html">Business Portal</a></li>
          <li class="nav-item"><a class="nav-link" href="donations.html">User Portal</a></li>
          <li class="nav-item"><a class="nav-link" href="in_need.html">In-Need Meals</a></li>
        </ul>
      </div>
    </div>
  </nav>
</head>

<body>
  <div class="container mt-5">

    <!-- Login / ID Input -->
    <div id="login-section" class="row justify-content-center">
      <div class="col-md-6">
        <div class="card p-4 shadow-sm border-0" style="border-radius: 12px;">
          <h4 class="text-center mb-3 text-primary">View Your History</h4>
          <div class="mb-3">
            <label class="form-label">Enter User ID</label>
            <input type="number" id="userIdInput" class="form-control" placeholder="e.g., 1">
          </div>
          <button onclick="loadUserDashboard()" class="btn btn-primary w-100">Load Dashboard</button>
        </div>
      </div>
    </div>

    <!-- Dashboard Content (Hidden initially) -->
    <div id="dashboard-content" style="display: none;">
      <div class="text-center mb-5">
        <h2 class="mb-2">Welcome, <span id="user-name">User</span></h2>
        <span id="user-role" class="badge bg-info fs-6"></span>
      </div>

      <div class="row">
        <!-- Donation History -->
        <div class="col-md-6">
          <div class="card shadow-sm mb-4 border-0" style="border-radius: 12px;">
            <div class="card-header bg-success text-white" style="border-radius: 12px 12px 0 0;">Your Donations</div>
            <ul class="list-group list-group-flush" id="donation-list">
              <li class="list-group-item text-muted">No donations found.</li>
            </ul>
          </div>
        </div>

        <!-- Meal History -->
        <div class="col-md-6">
          <div class="card shadow-sm mb-4 border-0" style="border-radius: 12px;">
            <div class="card-header bg-warning text-dark" style="border-radius: 12px 12px 0 0;">Meals Claimed</div>
            <ul class="list-group list-group-flush" id="meal-list">
              <li class="list-group-item text-muted">No meals claimed.</li>
            </ul>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script src="{{ url_for('static', filename='main.js') }}"></script>
</body>

</html>
